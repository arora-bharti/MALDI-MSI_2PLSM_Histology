name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy pandas scipy scikit-image scikit-learn \
                      matplotlib tifffile Pillow tqdm networkx shapely \
                      pyimzml pytest \
                      mypy pip-audit

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports --no-strict-optional --no-error-summary

      - name: Security audit (pip-audit)
        # CVE-2026-4539: ReDoS in pygments AdlLexer (archetype.py).
        # Ignored because: (1) this app never processes ADL files so the
        # vulnerable code path is never reached, (2) no patched release exists
        # yet (fix merged upstream, awaiting pygments >2.19.2).
        # Revisit when a new pygments release is available.
        run: pip-audit --ignore-vuln CVE-2026-4539

      - name: Run tests
        run: pytest tests/ -v --tb=short

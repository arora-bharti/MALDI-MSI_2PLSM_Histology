name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy pandas scipy scikit-image scikit-learn \
                      matplotlib tifffile Pillow tqdm networkx shapely \
                      pyimzml pytest \
                      mypy pip-audit

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports --no-strict-optional --no-error-summary

      - name: Security audit (pip-audit)
        run: pip-audit

      - name: Run tests
        run: pytest tests/ -v --tb=short
